name: Feature request
description: Suggest a product, research workflow, export, API, analytics, or PWA improvement.
title: "Feature: "
labels:
  - enhancement
body:
  - type: textarea
    id: use_case
    attributes:
      label: Research use case
      description: Who needs this and what workflow does it improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Describe the smallest useful version of the feature.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Existing workarounds or related tools.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Search and filters
        - Publication metadata
        - Citation network
        - Analytics
        - Exports/API/widgets
        - Alerts/push/PWA
        - Android app
        - R bibliometrics script
        - Documentation
        - Other
    validations:
      required: true

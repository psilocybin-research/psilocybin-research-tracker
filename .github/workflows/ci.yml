name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  php-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Audit public repository paths
        shell: bash
        run: |
          forbidden=$(git ls-files | grep -E '(^data/|^manuscript/|^msca-impact/|^assets/msca-impact/|\.sqlite$|\.sqlite3$|\.db$|\.log$|\.tar\.gz$|(^|/)publications\.(csv|json|bib|ris)$|^android/keystore/|^android/release/|\.jks$|\.keystore$|\.aab$|\.apk$)' | grep -v '^data/\.htaccess$' || true)
          if [ -n "$forbidden" ]; then
            echo "Forbidden public-repository paths detected:"
            echo "$forbidden"
            exit 1
          fi

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: sqlite3, pdo_sqlite, mbstring, json

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install frontend build tool
        run: npm install --global esbuild

      - name: Lint PHP files
        run: find . -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Run regression tests
        run: php tests/run.php

      - name: Build frontend assets
        run: bash bin/build-assets.sh
